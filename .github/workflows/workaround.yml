 name: Workaround merge queue workflows
 on:
   schedule:
     - cron: "*/10 * * * *"
 jobs:
   workaround:
     runs-on: ubuntu-latest
     permissions:
       actions: write
       contents: read
     steps:
       - run: |
           for br in $(gh api repos/$GITHUB_REPOSITORY/branches --jq '.[].name' | grep '^gh-readonly-queue/main/'); do
             sha=$(gh api repos/$GITHUB_REPOSITORY/branches/$br --jq .commit.sha)
             has=$(gh api repos/$GITHUB_REPOSITORY/commits/$sha/check-runs --jq '[.check_runs[] | select(.name=="build")] | length')
             if [ "$has" = "0" ]; then
               gh workflow run go.yml --ref "$br"
             fi
           done
         env:
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
